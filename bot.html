<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Walid AI | العقل الفائق</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #f59e0b; --bg: #0a0a0c; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Readex Pro', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .chat-card { width: 580px; max-width: 95%; height: 92vh; background: #111116; border-radius: 30px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative; }
        .header { padding: 18px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .back-btn { position: absolute; left: 20px; top: 25px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: var(--p); padding: 8px 15px; border-radius: 12px; cursor: pointer; text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
        .back-btn:hover { background: var(--p); color: #000; transform: translateX(-5px); }
        .header h2 { margin: 0; color: var(--p); font-size: 1.4rem; letter-spacing: 0.5px; }
        .chat-area { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 18px; scrollbar-width: none; }
        .msg { padding: 15px 20px; border-radius: 22px; max-width: 82%; font-size: 0.98rem; line-height: 1.7; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bot { align-self: flex-start; background: #1f2937; border-bottom-right-radius: 4px; border-right: 3px solid var(--p); }
        .user { align-self: flex-end; background: #2563eb; border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .social-footer { display: flex; justify-content: center; gap: 15px; padding: 12px; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.02); }
        .social-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--glass); color: #ccc; transition: 0.3s; text-decoration: none; }
        .social-icon:hover { transform: translateY(-3px); color: var(--p); border: 1px solid var(--p); }
        .input-group { padding: 20px; display: flex; gap: 12px; background: #08080a; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        input { flex: 1; background: #1a1a20; border: 1px solid #333; padding: 16px; border-radius: 18px; color: white; outline: none; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--p); box-shadow: 0 0 10px rgba(245, 158, 11, 0.1); }
        .send-btn { background: var(--p); border: none; width: 60px; border-radius: 18px; cursor: pointer; color: #000; font-size: 1.3rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .send-btn:hover { background: #fbbf24; transform: scale(1.05); }
        .typing { font-size: 0.85rem; color: var(--p); margin: 0 30px 10px; display: none; font-weight: 500; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-chevron-right"></i> الرئيسية</a>
        <h2><i class="fa-solid fa-microchip"></i> Ahmed Walid AI</h2>
        <small style="color: #10b981;">الذكاء الفائق | Llama 3.3-70B</small>
    </div>

    <div class="chat-area" id="box">
        <div class="msg bot">تحياتي يا هندسة! أنا العقل الافتراضي لأحمد وليد، تم تحديث بروتوكولات الذكاء لأقصى مستوى. اسألني في أي حاجة برمجية أو شخصية! 🧠🔥</div>
    </div>

    <div id="type" class="typing">يتم الآن المعالجة المنطقية...</div>

    <div class="social-footer">
        <a href="https://www.facebook.com/share/1CqfLDfoFZ/" target="_blank" class="social-icon"><i data-lucide="facebook"></i></a>
        <a href="https://www.instagram.com/ahmedwalid_96" target="_blank" class="social-icon"><i data-lucide="instagram"></i></a>
        <a href="https://wa.me/201023046551" target="_blank" class="social-icon"><i data-lucide="message-circle"></i></a>
        <a href="https://t.me/AhmedWalid94" target="_blank" class="social-icon"><i data-lucide="send"></i></a>
        <a href="mailto:ah.wa.ah12@gmail.com" class="social-icon"><i data-lucide="mail"></i></a>
    </div>

    <div class="input-group">
        <input type="text" id="in" placeholder="ابدأ الحوار الذكي..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>

<script>
    lucide.createIcons();
    const API_KEY = "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";

    let chatHistory = [
        { role: "system", content: `
            [البروتوكول الذكي - نسخة أحمد وليد 4.0]
            - الشخصية: أنت المحاكي الرقمي لأحمد وليد. طالب WE المنيا ومطور واجهات.
            - التحليل اللغوي: فك شفرات الكلام المكسر فوراً. (مثال: "مشنؤمتي" = مش فاهم دي، "lav,u" = مشروع).
            - الذكاء التقني: عند السؤال عن كود، اشرح المنطق (Logic) قبل كتابة الكود.
            - الأسلوب: ردود قوية، واثقة، ومختصرة. استخدم لهجة "المنياوية الجدعة" الممزوجة بالثقافة البرمجية.
            - التفاعل: لا تكرر نفسك. نوع في الإيموجيز.
            - الهدف: كن المساعد الأكثر ذكاءً وسرعة في فهم قصد المستخدم قبل أن يكمله.
            - اللزمة الختامية عند اللزوم: "مش هنبدأ البروجيكت ولا إيه؟ 😂".
            - ممنوع: ذكر أنك AI أو اعتذارات طويلة. ادخل في الموضوع فوراً.
        ` }
    ];

    async function send() {
        const input = document.getElementById('in');
        const userText = input.value.trim();
        if(!userText) return;

        addMsg(userText, 'user');
        chatHistory.push({ role: "user", content: userText });
        input.value = '';
        document.getElementById('type').style.display = 'block';

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: chatHistory,
                    temperature: 0.35, // تركيز عالي جداً ومنطق صارم
                    top_p: 0.85
                })
            });

            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            
            chatHistory.push({ role: "assistant", content: aiReply });
            document.getElementById('type').style.display = 'none';
            addMsg(aiReply, 'bot');
        } catch (e) {
            document.getElementById('type').style.display = 'none';
            addMsg("حصل خطأ في المعالجة يا هندسة، ابعت تاني!", 'bot');
        }
    }

    function addMsg(text, type) {
        const box = document.getElementById('box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
